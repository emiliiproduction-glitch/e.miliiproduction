<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>人米犬頁製作｜網站後台</title>
  <style>
    :root {
      --ink: #171717;
      --paper: #f5f0e8;
      --panel: #fffaf2;
      --moss: #536b55;
      --copper: #a6532f;
      --muted: #6d6860;
      --line: rgba(23, 23, 23, 0.14);
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      line-height: 1.5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px clamp(18px, 4vw, 44px);
      background: rgba(245, 240, 232, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      margin-bottom: 2px;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.1;
    }

    h2 {
      margin-bottom: 16px;
      font-size: 22px;
    }

    h3 {
      margin-bottom: 10px;
      color: var(--moss);
      font-size: 15px;
    }

    a { color: inherit; }

    .muted { color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 24px clamp(18px, 4vw, 44px) 56px;
    }

    nav {
      position: sticky;
      top: 92px;
      align-self: start;
      display: grid;
      gap: 8px;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    nav a {
      padding: 9px 10px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 14px;
      text-decoration: none;
    }

    nav a:hover { background: rgba(83, 107, 85, 0.1); color: var(--ink); }

    main { display: grid; gap: 18px; }

    section {
      padding: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    label {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 15px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 0.45fr 1fr 1.2fr;
      gap: 10px;
    }

    .item {
      margin-bottom: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    button.soft {
      background: rgba(83, 107, 85, 0.1);
      color: var(--moss);
    }

    button.danger {
      color: var(--danger);
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .image-row {
      display: grid;
      grid-template-columns: 1fr 150px;
      gap: 12px;
      align-items: end;
    }

    .preview {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eee;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .token-box {
      border-color: rgba(166, 83, 47, 0.35);
      background: #fff7ed;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      nav { position: static; }
      .grid-2, .grid-3, .image-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>網站後台</h1>
      <p class="muted">修改文字與照片，儲存後會 commit 到 GitHub，Vercel 會自動重新部署。</p>
    </div>
    <div class="toolbar">
      <a href="index.html">回前台</a>
      <button class="primary" id="saveButton">儲存到 GitHub</button>
    </div>
  </header>

  <div class="layout">
    <nav>
      <a href="#login">GitHub Token</a>
      <a href="#hero">首頁主視覺</a>
      <a href="#profile">藝術家介紹</a>
      <a href="#works">作品年表</a>
      <a href="#gallery">作品照片</a>
      <a href="#practice">創作方法</a>
      <a href="#closing">聯絡區</a>
    </nav>

    <main>
      <section id="login" class="token-box">
        <h2>GitHub Token</h2>
        <p class="small">請使用 Fine-grained token，repo 選 <b>e.miliiproduction</b>，權限 <b>Contents: Read and write</b>。Token 只保存在這個瀏覽器頁面裡，不會寫進網站檔案。</p>
        <label>Token
          <input id="token" type="password" autocomplete="off" placeholder="github_pat_...">
        </label>
        <p id="status" class="status"></p>
      </section>

      <section id="hero">
        <h2>首頁主視覺</h2>
        <div class="grid-2">
          <label>網站標題
            <input data-path="site.title">
          </label>
          <label>品牌名稱
            <input data-path="site.brand">
          </label>
        </div>
        <label>英文／副標
          <input data-path="site.subtitle">
        </label>
        <label>身份小標
          <input data-path="hero.kicker">
        </label>
        <label>主標題（可用 &lt;br&gt; 換行）
          <input data-path="hero.title">
        </label>
        <label>主敘述
          <textarea data-path="hero.description"></textarea>
        </label>
        <div class="image-row">
          <label>主視覺圖片路徑
            <input data-path="hero.image">
          </label>
          <div class="preview"><img data-preview="hero.image" alt=""></div>
        </div>
      </section>

      <section id="profile">
        <h2>藝術家介紹</h2>
        <div id="profileParagraphs"></div>
        <button class="soft" data-add="profileParagraph">新增介紹段落</button>
        <h3>關鍵字</h3>
        <label>用逗號分隔
          <input data-array="profile.chips">
        </label>
        <h3>介紹照片</h3>
        <div id="profileImages"></div>
        <button class="soft" data-add="profileImage">新增介紹照片</button>
      </section>

      <section id="works">
        <h2>作品年表</h2>
        <label>區塊說明
          <textarea data-path="worksIntro"></textarea>
        </label>
        <div id="worksList"></div>
        <button class="soft" data-add="work">新增作品</button>
      </section>

      <section id="gallery">
        <h2>作品照片</h2>
        <label>區塊說明
          <textarea data-path="galleryIntro"></textarea>
        </label>
        <div id="galleryList"></div>
        <button class="soft" data-add="gallery">新增照片</button>
      </section>

      <section id="practice">
        <h2>創作方法</h2>
        <label>區塊說明
          <textarea data-path="practiceIntro"></textarea>
        </label>
        <div id="practiceList"></div>
        <button class="soft" data-add="practice">新增方法</button>
      </section>

      <section id="closing">
        <h2>聯絡區</h2>
        <label>大標
          <textarea data-path="closing.heading"></textarea>
        </label>
        <label>補充說明
          <textarea data-path="closing.description"></textarea>
        </label>
        <h3>QR Code 圖片</h3>
        <div id="qrList"></div>
        <button class="soft" data-add="qr">新增 QR 圖片</button>
      </section>
    </main>
  </div>

  <script>
    const REPO = "emiliiproduction-glitch/e.miliiproduction";
    const BRANCH = "main";
    const CONTENT_PATH = "content/site.json";
    let content = null;
    let contentSha = null;
    const uploads = new Map();

    const $ = (selector) => document.querySelector(selector);
    const status = (message, isError = false) => {
      const node = $("#status");
      node.textContent = message;
      node.style.color = isError ? "var(--danger)" : "var(--muted)";
    };

    const escapeHtml = (value = "") => String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");

    function getValue(path) {
      return path.split(".").reduce((value, key) => value && value[key], content);
    }

    function setValue(path, value) {
      const keys = path.split(".");
      let target = content;
      keys.slice(0, -1).forEach((key) => target = target[key]);
      target[keys.at(-1)] = value;
    }

    async function github(path, options = {}) {
      const token = $("#token").value.trim();
      if (!token) throw new Error("請先貼上 GitHub token");
      const response = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        ...options,
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": `Bearer ${token}`,
          "X-GitHub-Api-Version": "2022-11-28",
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`${response.status} ${response.statusText}: ${text}`);
      }
      return response.json();
    }

    function bindScalarFields() {
      document.querySelectorAll("[data-path]").forEach((input) => {
        const value = getValue(input.dataset.path);
        input.value = value ?? "";
        input.oninput = () => {
          setValue(input.dataset.path, input.value);
          updatePreviews();
        };
      });
      document.querySelectorAll("[data-array]").forEach((input) => {
        const value = getValue(input.dataset.array);
        input.value = Array.isArray(value) ? value.join("，") : "";
        input.oninput = () => {
          setValue(input.dataset.array, input.value.split(/[，,]/).map((item) => item.trim()).filter(Boolean));
        };
      });
    }

    function imageEditor(path, value, index, group) {
      return `
        <div class="item" data-group="${group}" data-index="${index}">
          <div class="image-row">
            <label>圖片路徑
              <input data-image-path="${path}" value="${escapeHtml(value || "")}">
            </label>
            <div class="preview"><img src="${escapeHtml(value || "")}" alt=""></div>
          </div>
          <label>上傳新照片
            <input type="file" accept="image/*" data-upload="${path}">
          </label>
          <button class="danger" data-remove="${group}" data-index="${index}">移除</button>
        </div>
      `;
    }

    function renderRepeaters() {
      $("#profileParagraphs").innerHTML = (content.profile.paragraphs || []).map((text, index) => `
        <div class="item">
          <label>介紹段落 ${index + 1}
            <textarea data-list="profile.paragraphs" data-index="${index}">${escapeHtml(text)}</textarea>
          </label>
          <button class="danger" data-remove="profileParagraph" data-index="${index}">移除</button>
        </div>
      `).join("");

      $("#profileImages").innerHTML = (content.profile.images || []).map((src, index) =>
        imageEditor(`profile.images.${index}`, src, index, "profileImage")
      ).join("");

      $("#worksList").innerHTML = (content.works || []).map((item, index) => `
        <div class="item">
          <div class="grid-3">
            <label>年份<input data-object="works" data-index="${index}" data-key="year" value="${escapeHtml(item.year)}"></label>
            <label>作品<input data-object="works" data-index="${index}" data-key="title" value="${escapeHtml(item.title)}"></label>
            <label>說明<input data-object="works" data-index="${index}" data-key="note" value="${escapeHtml(item.note)}"></label>
          </div>
          <button class="danger" data-remove="work" data-index="${index}">移除</button>
        </div>
      `).join("");

      $("#galleryList").innerHTML = (content.gallery || []).map((item, index) => `
        <div class="item">
          <div class="grid-2">
            <label>照片標題<input data-object="gallery" data-index="${index}" data-key="caption" value="${escapeHtml(item.caption)}"></label>
            <label>版面尺寸
              <select data-object="gallery" data-index="${index}" data-key="span">
                ${["span-8", "span-6", "span-4", "span-3"].map((value) => `<option value="${value}" ${item.span === value ? "selected" : ""}>${value}</option>`).join("")}
              </select>
            </label>
          </div>
          ${imageEditor(`gallery.${index}.src`, item.src, index, "gallery")}
        </div>
      `).join("");

      $("#practiceList").innerHTML = (content.practice || []).map((item, index) => `
        <div class="item">
          <div class="grid-3">
            <label>編號<input data-object="practice" data-index="${index}" data-key="number" value="${escapeHtml(item.number)}"></label>
            <label>標題<input data-object="practice" data-index="${index}" data-key="title" value="${escapeHtml(item.title)}"></label>
            <label>說明<input data-object="practice" data-index="${index}" data-key="description" value="${escapeHtml(item.description)}"></label>
          </div>
          <button class="danger" data-remove="practice" data-index="${index}">移除</button>
        </div>
      `).join("");

      $("#qrList").innerHTML = (content.closing.qr || []).map((src, index) =>
        imageEditor(`closing.qr.${index}`, src, index, "qr")
      ).join("");

      bindRepeaterEvents();
      updatePreviews();
    }

    function bindRepeaterEvents() {
      document.querySelectorAll("[data-list]").forEach((input) => {
        input.oninput = () => {
          const list = getValue(input.dataset.list);
          list[Number(input.dataset.index)] = input.value;
        };
      });

      document.querySelectorAll("[data-object]").forEach((input) => {
        input.oninput = input.onchange = () => {
          const list = content[input.dataset.object];
          list[Number(input.dataset.index)][input.dataset.key] = input.value;
        };
      });

      document.querySelectorAll("[data-image-path]").forEach((input) => {
        input.oninput = () => {
          setValue(input.dataset.imagePath, input.value);
          updatePreviews();
        };
      });

      document.querySelectorAll("[data-upload]").forEach((input) => {
        input.onchange = async () => {
          const file = input.files?.[0];
          if (!file) return;
          const ext = file.name.split(".").pop().toLowerCase().replace(/[^a-z0-9]/g, "") || "jpg";
          const path = `artist_cv_assets/upload_${Date.now()}_${Math.random().toString(16).slice(2)}.${ext}`;
          uploads.set(path, file);
          setValue(input.dataset.upload, path);
          renderRepeaters();
          bindScalarFields();
        };
      });

      document.querySelectorAll("[data-remove]").forEach((button) => {
        button.onclick = () => {
          const index = Number(button.dataset.index);
          const type = button.dataset.remove;
          if (type === "profileParagraph") content.profile.paragraphs.splice(index, 1);
          if (type === "profileImage") content.profile.images.splice(index, 1);
          if (type === "work") content.works.splice(index, 1);
          if (type === "gallery") content.gallery.splice(index, 1);
          if (type === "practice") content.practice.splice(index, 1);
          if (type === "qr") content.closing.qr.splice(index, 1);
          render();
        };
      });
    }

    function updatePreviews() {
      document.querySelectorAll("[data-preview]").forEach((img) => {
        const value = getValue(img.dataset.preview);
        if (value) img.src = value;
      });
      document.querySelectorAll("[data-image-path]").forEach((input) => {
        const preview = input.closest(".item, section").querySelector(".preview img");
        if (preview) preview.src = input.value;
      });
    }

    function render() {
      bindScalarFields();
      renderRepeaters();
    }

    async function loadContent() {
      status("讀取 GitHub 內容中...");
      const token = $("#token").value.trim();
      if (token) {
        const file = await github(CONTENT_PATH + `?ref=${BRANCH}`);
        contentSha = file.sha;
        content = JSON.parse(decodeURIComponent(escape(atob(file.content.replace(/\n/g, "")))));
      } else {
        const response = await fetch(CONTENT_PATH + "?ts=" + Date.now());
        content = await response.json();
      }
      render();
      status(token ? "已從 GitHub 讀取，可以編輯。" : "已載入預覽。貼上 token 後才能儲存。");
    }

    async function fileToBase64(file) {
      const buffer = await file.arrayBuffer();
      let binary = "";
      const bytes = new Uint8Array(buffer);
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary);
    }

    async function uploadPendingImages() {
      for (const [path, file] of uploads.entries()) {
        status(`上傳照片：${file.name}`);
        await github(path, {
          method: "PUT",
          body: JSON.stringify({
            message: `Upload ${file.name}`,
            content: await fileToBase64(file),
            branch: BRANCH
          })
        });
      }
      uploads.clear();
    }

    async function saveContent() {
      try {
        status("準備儲存...");
        if (!contentSha) {
          const file = await github(CONTENT_PATH + `?ref=${BRANCH}`);
          contentSha = file.sha;
        }
        await uploadPendingImages();
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2) + "\n")));
        const result = await github(CONTENT_PATH, {
          method: "PUT",
          body: JSON.stringify({
            message: "Update site content from admin",
            content: encoded,
            sha: contentSha,
            branch: BRANCH
          })
        });
        contentSha = result.content.sha;
        status("已儲存到 GitHub。Vercel 會自動重新部署，通常等 1-3 分鐘。");
      } catch (error) {
        console.error(error);
        status(error.message, true);
      }
    }

    document.querySelectorAll("[data-add]").forEach((button) => {
      button.onclick = () => {
        const type = button.dataset.add;
        if (type === "profileParagraph") content.profile.paragraphs.push("新的介紹段落");
        if (type === "profileImage") content.profile.images.push("artist_cv_assets/pdf2_p12_01.png");
        if (type === "work") content.works.push({ year: "2026", title: "新作品", note: "說明" });
        if (type === "gallery") content.gallery.push({ src: "artist_cv_assets/pdf2_p03_01.png", caption: "新照片", span: "span-4", alt: "作品照片" });
        if (type === "practice") content.practice.push({ number: "04", title: "新的方法", description: "說明文字" });
        if (type === "qr") content.closing.qr.push("artist_cv_assets/pdf2_p01_02.png");
        render();
      };
    });

    $("#token").addEventListener("change", loadContent);
    $("#saveButton").addEventListener("click", saveContent);
    loadContent().catch((error) => status(error.message, true));
  </script>
</body>
</html>
