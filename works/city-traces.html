<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="../favicon.ico?v=8">
  <link rel="icon" type="image/png" href="../favicon.png?v=8">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png?v=8">
  <link rel="stylesheet" href="../work-style.css?v=3">
  <title>城市轍跡 City Traces｜人米犬頁製作</title>
  <style>
    :root { --bg:#030303; --fg:#f4f1ea; --muted:rgba(244,241,234,.66); --line:rgba(244,241,234,.16); --panel:#0b0b0b; --max:1180px; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif; line-height:1.65; }
    a { color:inherit; text-decoration:none; }
    img { display:block; width:100%; height:100%; object-fit:cover; }
    .nav { position:fixed; inset:0 0 auto; z-index:10; min-height:58px; display:flex; justify-content:space-between; align-items:center; padding:0 clamp(18px,4vw,44px); border-bottom:1px solid var(--line); background:rgba(3,3,3,.75); backdrop-filter:blur(18px); font-size:13px; font-weight:800; }
    .nav-logo { display:block; width:104px; height:44px; object-fit:contain; object-position:left center; }
    .hero { min-height:100svh; position:relative; display:grid; align-items:end; overflow:hidden; background:#000; }
    .hero img { position:absolute; inset:0; opacity:.82; filter:grayscale(.08) contrast(1.06); transform:scale(1.04); }
    .hero:after { content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.18) 40%,rgba(0,0,0,.94)),linear-gradient(90deg,rgba(0,0,0,.68),rgba(0,0,0,.06)); }
    .hero-inner { position:relative; z-index:1; width:min(var(--max),100%); margin:0 auto; padding:96px clamp(18px,4vw,44px) 56px; }
    .kicker,.label { margin:0 0 14px; color:var(--muted); font-size:13px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(28px,4vw,48px); line-height:.92; font-weight:680; }
    .title-en { display:block; margin-top:10px; color:rgba(244,241,234,.68); font-size:clamp(13px,1.25vw,18px); line-height:1.35; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }
    h2 { margin:0 0 24px; font-size:clamp(21px,2.4vw,30px); line-height:1; font-weight:620; }
    .intro,.media,.gallery { width:min(var(--max),100%); margin:0 auto; padding:clamp(44px,7vw,88px) clamp(18px,4vw,44px); border-bottom:1px solid var(--line); }
    .intro { display:grid; grid-template-columns:.82fr 1.18fr; gap:clamp(28px,6vw,86px); }
    .meta { display:grid; gap:1px; align-self:start; border:1px solid var(--line); }
    .meta div { display:grid; grid-template-columns:96px 1fr; gap:14px; padding:13px; background:rgba(255,255,255,.035); border-bottom:1px solid var(--line); font-size:14px; }
    .meta div:last-child { border-bottom:0; }
    .meta b,.copy p { color:var(--muted); }
    .copy p { margin:0 0 18px; font-size:clamp(15px,1.35vw,17px); }
    .button-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:28px; }
    .button { display:inline-flex; border:1px solid currentColor; border-radius:999px; padding:8px 12px; color:var(--fg); font-size:12px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
    .video { aspect-ratio:16/9; width:100%; border:1px solid var(--line); background:#000; }
    iframe { width:100%; height:100%; border:0; display:block; }
    .gallery { display:grid; grid-template-columns:repeat(12,1fr); grid-auto-rows:92px; gap:10px; }
    figure { margin:0; overflow:hidden; background:#111; }
    .wide { grid-column:span 8; grid-row:span 5; } .tall { grid-column:span 4; grid-row:span 5; } .half { grid-column:span 6; grid-row:span 4; }
    @media (max-width:900px){ .intro{grid-template-columns:1fr}.wide,.tall,.half{grid-column:span 12;grid-row:span 4} }
  </style>
</head>
<body>
  <nav class="nav"><a href="../index.html" aria-label="人米犬頁製作首頁"><img class="nav-logo" src="../artist_cv_assets/logos/pudgala-logo.png" alt="人米犬頁製作"></a><a href="../productions.html">Back to productions</a></nav>
  <section class="hero"><img src="../artist_cv_assets/drive_stage/stage_01.jpg" alt="城市轍跡演出照片"><div class="hero-inner"><p class="kicker">Production / 2024</p><h1>城市轍跡<span class="title-en">City Traces</span></h1></div></section>
  <section class="intro">
    <div class="meta">
      <div><b>形式</b><span>公共藝術／現地表演／舞蹈編排</span></div>
      <div><b>年份</b><span>2024</span></div>
      <div><b>影像</b><span>精華影片已嵌入</span></div>
      <div><b>照片</b><span>使用 CV 內城市轍跡資料</span></div>
    </div>
    <div class="copy">
      <h2>作品介紹</h2>
      <p>城市轍跡 City Traces 以城市紋理、行走軌跡與公共空間作為身體的起點，將舞蹈從劇場推向日常空間，讓觀眾在既有地景中重新感受時間的流動。</p>
      <p>作品以公共空間中的現地表演形式出現，將隊形、路徑、聲響與身體編排交織成一場短暫而清晰的城市觀看。</p>
    </div>
  </section>
  <section class="media"><p class="label">Highlight</p><h2>精華影片</h2><div class="video"><iframe src="https://www.youtube.com/embed/RHzYZJt1Z8o" title="城市轍跡精華影片" allowfullscreen></iframe></div></section>
  <section class="gallery">
    <figure class="tall"><img src="../artist_cv_assets/drive_stage/stage_02.jpg" alt="人米犬頁製作作品照片"></figure>
    <figure class="half"><img src="../artist_cv_assets/drive_stage/stage_03.jpg" alt="人米犬頁製作作品照片"></figure>
    <figure class="half"><img src="../artist_cv_assets/drive_stage/stage_04.jpg" alt="人米犬頁製作作品照片"></figure>
  </section>
</body>
</html>
